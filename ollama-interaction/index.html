<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Minimal</title>
    <!-- Inter Font from Google -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Marked -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlight.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  </head>
  <body
    class="bg-zinc-100 dark:bg-zinc-950 min-h-screen text-zinc-900 dark:text-zinc-100 transition-colors duration-200"
  >
    <div class="flex h-screen overflow-hidden">
      <!-- Sidebar -->
        <aside id="sidebar" class="w-64 flex flex-col absolute md:relative z-20 h-full transform transition-transform duration-300 -translate-x-full md:translate-x-0">
            <div class="p-8 pb-4 flex items-center justify-between">
                <h2 class="text-[0.6rem] font-black uppercase tracking-[0.2em] text-zinc-400 dark:text-zinc-600">History</h2>
                <button id="close-sidebar" class="md:hidden text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 text-xl leading-none">×</button>
            </div>

        <div class="px-5 mb-6">
          <button
            id="new-chat-btn"
            class="w-full flex items-center justify-between px-4 py-2.5 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl text-xs font-bold shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all"
          >
            <span>Create Fresh Thread</span>
            <span class="text-lg leading-none opacity-40">+</span>
          </button>
        </div>

        <nav id="chat-list" class="flex-1 overflow-y-auto space-y-1">
          <!-- Chat items injected here -->
        </nav>

        <div class="p-6 border-t border-zinc-200 dark:border-zinc-800/50">
          <div class="flex items-center justify-between">
            <div class="flex flex-col">
              <span
                class="text-[0.55rem] font-black uppercase tracking-widest text-zinc-400"
                >Ollama Core</span
              >
              <span
                class="text-[0.5rem] font-medium text-zinc-300 dark:text-zinc-700 select-none"
                >Revision 1.2.0</span
              >
            </div>
            <button
              id="theme-toggle"
              class="p-2 bg-zinc-50 dark:bg-zinc-900 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors"
            >
              <svg
                id="theme-icon"
                class="w-4 h-4"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707"
                />
              </svg>
            </button>
          </div>
        </div>
      </aside>

      <!-- Main Workspace -->
      <main
        class="flex-1 flex flex-col relative bg-transparent overflow-hidden"
      >
        <!-- Header Nav -->
        <header class="h-16 flex items-center justify-between px-8 z-20">
          <div class="flex items-center gap-6">
            <button
              id="open-sidebar"
              class="md:hidden text-xs font-bold uppercase tracking-widest bg-zinc-900 dark:bg-zinc-100 text-white dark:text-black px-3 py-1.5 rounded-md"
            >
              Menu
            </button>
            <div class="flex flex-col">
              <h2
                id="current-chat-title"
                class="text-sm font-black tracking-tight truncate max-w-[180px] md:max-w-xl"
              >
                Initial Thread
              </h2>
              <div class="flex items-center gap-1.5 opacity-40">
                <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
                <span class="text-[0.6rem] font-bold uppercase tracking-widest"
                  >Local Engine Online</span
                >
              </div>
            </div>
          </div>

          <div class="flex items-center gap-4">
            <!-- Thinking Config -->
            <div id="thinking-config" class="hidden flex items-center gap-3 bg-zinc-50 dark:bg-zinc-900 px-3 py-1.5 rounded-lg border border-zinc-200 dark:border-zinc-800">
               <div class="flex items-center gap-2">
                 <label for="think-toggle" class="text-[0.6rem] font-bold uppercase tracking-wider opacity-50 cursor-pointer">Think</label>
                 <input type="checkbox" id="think-toggle" class="w-3 h-3 accent-zinc-900 dark:accent-zinc-100 cursor-pointer">
               </div>
               <div class="w-[1px] h-3 bg-zinc-200 dark:bg-zinc-800"></div>
               <select id="think-level" class="bg-transparent text-[0.6rem] font-bold uppercase tracking-wider outline-none cursor-pointer">
                 <option value="true">Enable</option>
                 <option value="low">Low</option>
                 <option value="medium">Medium</option>
                 <option value="high">High</option>
               </select>
            </div>

            <div class="hidden sm:block">
              <select id="model-select" class="text-xs"></select>
            </div>
          </div>
        </header>

        <!-- Chat Area -->
        <div
          id="chat-area"
          class="flex-1 overflow-y-auto px-6 py-10 md:px-20 space-y-12"
        >
          <div
            id="welcome-screen"
            class="h-full flex flex-col items-center justify-center text-center p-8 max-w-xl mx-auto opacity-0 animate-in fade-in zoom-in duration-1000 fill-mode-forwards"
          >
            <h1 class="mb-6">Ollama</h1>
            <p
              class="text-xs text-zinc-500 dark:text-zinc-500 font-bold uppercase tracking-[0.25em] leading-relaxed max-w-sm mx-auto"
            >
              Private Intelligence Interface
            </p>
          </div>
        </div>

            <!-- Compose Zone -->
            <div class="px-6 py-8 md:px-20 md:pb-12 bg-transparent sticky bottom-0 z-10">
                <div class="max-w-4xl mx-auto w-full">
                    
                    <!-- Context Preview Area -->
                    <div id="context-preview" class="mb-3 flex flex-wrap gap-2 empty:hidden">
                        <!-- Context chips (files/links) will appear here -->
                    </div>

                    <form id="chat-form" class="relative group pointer-events-auto">
                        <!-- Hidden File Input -->
                        <input type="file" id="file-upload" class="hidden" accept=".txt,.md,.js,.py,.html,.css">
                        
                        <div class="flex items-center gap-3 w-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-1 shadow-sm focus-within:shadow-md focus-within:border-zinc-300 dark:focus-within:border-zinc-700 transition-all">
                            <button type="button" id="attach-btn" class="p-3 ml-1 text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300 transition-colors" title="Attach Document (.txt, .md)">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
                                </svg>
                            </button>

                            <textarea 
                                id="user-input" 
                                placeholder="Message engine or paste a link..." 
                                class="flex-1 bg-transparent px-2 py-4 text-sm font-medium outline-none resize-none overflow-hidden"
                                rows="1"
                                autocomplete="off"
                            ></textarea>

                            <button 
                                type="submit" 
                                id="send-btn" 
                                class="mr-2 bg-zinc-900 dark:bg-zinc-50 text-white dark:text-zinc-950 text-[0.6rem] font-black uppercase tracking-widest px-5 py-3 rounded-xl hover:opacity-90 active:scale-95 transition-all"
                            >
                                Execute
                            </button>

                            <button 
                                type="button" 
                                id="stop-btn" 
                                class="hidden mr-2 bg-red-600 text-white text-[0.6rem] font-black uppercase tracking-widest px-5 py-3 rounded-xl hover:bg-red-700 active:scale-95 transition-all"
                            >
                                Stop
                            </button>
                        </div>
                    </form>

                    <div class="mt-4 flex items-center justify-center gap-6">
                        <span class="text-[0.6rem] text-zinc-400 font-bold uppercase tracking-widest">RAG Mode Supported</span>
                        <div class="w-1 h-1 rounded-full bg-zinc-300 dark:bg-zinc-800"></div>
                        <span class="text-[0.6rem] text-zinc-400 font-bold uppercase tracking-widest">Private Link Analysis</span>
                    </div>
                </div>
            </div>
        </div>
      </main>
    </div>

    <!-- Custom JS -->
    <script src="script.js"></script>
  </body>
</html>
