<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Live2D Model</title>
    <style>
        nav{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        ul {
            display: flex;
            gap: 16px;
        }
        li{
            padding: 10px 20px;
            transition: 1s;
        }
        a{
            font-size: 2rem;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 600;
            color: white;
            text-decoration: none;
        }
        li:hover{
            border-bottom: 1px solid white;
        }

        canvas{
            /* position: inherit !important; */
            height: max-content !important;
        }

        .hero .hero-wrapper{
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }

        .hero .hero-wrapper div{
            width: 50%;
            height: 80dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

    </style>
  </head>
  <body style="background-image: url(https://cdn.pixabay.com/photo/2018/12/12/11/49/starry-night-3870664_1280.jpg);">
    <div class="container">
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Portofolio</a></li>
                <li><a href="#">Blog</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
            
        </nav>
    </div>
    <div class="container">
        <section class="hero">
            <div class="hero-wrapper">
                <div class="column-1">
                    
                </div>
                <div class="column-2">
                    <h1>Hi, i am Maidy. web developer</h1>
                </div>
            </div>
        </section>
    </div>
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/combine/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js,npm/pixi.js@6.5.2/dist/browser/pixi.min.js,npm/pixi-live2d-display/dist/index.min.js,gh/Weidows-projects/Live2dLoader/dist/Live2dLoader.min.js"></script>
    <script>
      new Live2dLoader([
        {
          width: 500,
          height: 800,
          left: "100px",
          bottom: "-250px",
          role: "model/HoshinoAi/Hoshino_Ai.model3.json",//path ke file model.json
          opacity: 1,
          scale: 0.1,
          mobile: true,
          draggable: true,
        },
      ]);
    </script>
  </body>
</html>
